name: Reusable Deploy
on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact to deploy'
        required: false
        type: string
        default: 'dist-files'
jobs:
    deploy:
        runs-on: ubuntu-slim
        steps:
        - name: Get code
          uses: actions/download-artifact@v7
          with:
            name: ${{ inputs.artifact-name }}
        - name: List files
          run: ls
        - name: Output information
          run: |
            echo "Deploying artifact: ${{ inputs.artifact-name }}"