name: Matrix demo
on: [push, workflow_dispatch]
jobs:
    build:
        runs-on: ubuntu-slim
        steps:
            - name: Get code
              uses: actions/checkout@v7
            - name: Insall NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: latest
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm run build