name: Matrix demo
on: [push, workflow_dispatch]
jobs:
    build:
        strategy:
            matrix:
                node-version: [22, 24]
                operating-system: [ubuntu-latest, ubuntu-slim, windows-latest, macos-latest]
        runs-on: ${{ matrix.operating-system }}
        steps:
            - name: Get code
              uses: actions/checkout@v7
            - name: Insall NodeJS
              uses: actions/setup-node@v6
              with:
                node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm ci
            - name: Build project
              run: npm run build