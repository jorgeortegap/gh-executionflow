name: Using reusable workflow
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Lint code
        run: npm run lint
  test:
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Test code
        id: run-tests
        run: npm run test
      - name: Upload test report
        if: failure() && steps.run-tests.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: test.json
  build:
    needs: test
    runs-on: ubuntu-slim
    steps:
      - name: Get code
        uses: actions/checkout@v7
      - name: Cache dependencies
        id: cache
        uses: actions/cache@v6
        with:
          path: node_modules
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build website
        id: build-website
        run: npm run build
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist-files
          path: dist
  deploy:
    needs: build
    uses: ./.github/workflows/reusable.yml
  report:
    if: failure()
    needs: [lint, test, build, deploy]
    runs-on: ubuntu-slim
    steps:
      - name: Output information
        run: |
          echo "Something went wrong during the workflow execution."
          echo "${{ toJSON(github) }}"